name: Publixion Social Publisher
on:
  schedule:
    - cron: '0 4  * * *'
    - cron: '0 7  * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, skip actual posting)'
        required: false
        default: 'false'
      generate:
        description: 'Generate all posts from templates'
        required: false
        default: 'false'
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install axios
      - name: Generate Queue (run once)
        if: github.event.inputs.generate == 'true'
        run: |
          node scripts/generate_all.js --force
          git config user.name "Publixion Bot"
          git config user.email "bot@publixion.com"
          git add posts/queue.json
          git commit -m "[bot] Generate queue from templates" || echo "Nothing to commit"
          git push
      - name: Run Publisher
        env:
          LI_ACCESS_TOKEN:          ${{ secrets.LI_ACCESS_TOKEN }}
          LI_PERSON_URN:            ${{ secrets.LI_PERSON_URN }}
          LI_PAGE_URN:              ${{ secrets.LI_PAGE_URN }}
          FB_PAGE_ACCESS_TOKEN:     ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID:               ${{ secrets.FB_PAGE_ID }}
          IG_ACCESS_TOKEN:          ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID:            ${{ secrets.IG_ACCOUNT_ID }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER:  ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME:   ${{ github.event.repository.name }}
          DRY_RUN:                  ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/publish_daily.js
